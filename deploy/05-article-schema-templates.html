<!-- 使用示例：MOC入门教程文章 -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "积木MOC入门指南：从零开始创作你的第一件积木作品",
  "description": "详细介绍积木MOC入门步骤：选择拼搭软件、设计作品、导出零件表、购买散件、完成拼搭。适合积木爱好者和新手设计师参考。",
  "author": {
    "@type": "Person",
    "name": "{{作者名}}",
    "url": "https://gobricks.cn/designer/{{作者ID}}"
  },
  "datePublished": "2026-05-25",
  "dateModified": "2026-05-25",
  "image": "https://gobricks.cn/images/moc-guide-cover.jpg",
  "publisher": {
    "@type": "Organization",
    "name": "高砖积木",
    "logo": {
      "@type": "ImageObject",
      "url": "https://gobricks.cn/logo.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://gobricks.cn/blog/moc-guide"
  }
}
</script>
