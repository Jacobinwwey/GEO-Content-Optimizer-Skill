<!--
  高砖积木 (GOBRICKS) — BreadcrumbList Schema

  作用：为 AI 爬虫提供导航结构，帮助理解页面层级关系

  使用方法：根据当前页面路径，复制对应的 Schema 代码块
-->

      "position": 1,
      "name": "首页",

    }
  ]
}
</script>
-->


<!-- ============================================ -->
<!-- 商城页面: 首页 > 商城                         -->
<!-- ============================================ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "首页",
      "item": "https://gobricks.cn"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "商城",
      "item": "https://gobricks.cn/shop"
    }
  ]
}
</script>
